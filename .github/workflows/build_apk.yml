name: Build ChatWing APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.0
          channel: stable
      - name: Check version
        run: flutter --version
      - name: Setup ADB
        run: export ANDROID_HOME=/usr/local/lib/android/sdk && export PATH=$ANDROID_HOME/platform-tools:$PATH && which adb || echo 'adb not found'
      - name: Build APK
        run: export ANDROID_HOME=/usr/local/lib/android/sdk && export PATH=$ANDROID_HOME/platform-tools:$PATH && flutter build apk --release
        timeout-minutes: 20
      - uses: actions/upload-artifact@v4
        with:
          name: chatwing-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk