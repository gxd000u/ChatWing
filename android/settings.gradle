pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localFile = file("local.properties")
        if (localFile.exists()) {
            localFile.withInputStream { properties.load(it) }
        }
        def sdk = properties.getProperty("flutter.sdk")
        if (sdk == null) {
            sdk = System.env.FLUTTER_ROOT
        }
        if (sdk == null) {
            throw new GradleException("flutter.sdk not set and FLUTTER_ROOT not set")
        }
        return sdk
    }()
    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
    repositories { google(); mavenCentral(); gradlePluginPortal() }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.2.1" apply false
    id "org.jetbrains.kotlin.android" version "1.9.22" apply false
}

include ":app"