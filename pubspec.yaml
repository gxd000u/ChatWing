name: chatwing
description: ChatWing - AI 僚机助手
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  provider: ^6.1.1

  # 本地存储
  sqflite: ^2.3.2
  path_provider: ^2.1.2

  # HTTP (调用大模型 API)
  http: ^1.2.0

  # JSON 序列化
  json_annotation: ^4.8.1

  # 加密 (API Key 安全存储)
  flutter_secure_storage: ^9.0.0

  # 剪贴板
  clipboard: ^0.1.3

  # Cupertino 图标
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.ttf
        - asset: assets/fonts/NotoSansSC-Bold.ttf
          weight: 700
